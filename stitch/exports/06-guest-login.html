<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-6">
<div class="flex flex-col items-center mb-12 text-center">
<span class="serif-headline italic text-primary text-3xl md:text-4xl mb-2 tracking-tight">Vows &amp; Vermillion</span>
<p class="font-label text-secondary uppercase tracking-[0.2em] text-[10px] font-semibold">The Digital Heirloom Experience</p>
</div>
<div class="glass-panel p-8 md:p-10 rounded-xl shadow-[0_32px_64px_-12px_rgba(56,56,51,0.08)] border border-white/40">
<div class="mb-8">
<h1 class="serif-headline text-2xl text-on-surface mb-2">Welcome Guest</h1>
<p class="text-on-surface-variant font-body text-sm">Please enter your details to join the celebration.</p>
</div>
<form class="space-y-6">
<!-- Full Name Field -->
<div class="relative">
<label class="font-label text-[11px] uppercase tracking-widest text-secondary font-bold absolute -top-2 left-0 z-10" for="full_name">Full Name</label>
<input class="w-full bg-surface-container-high border-0 border-b-2 border-transparent focus:border-tertiary focus:ring-0 rounded-none pt-4 pb-2 px-0 text-on-surface placeholder:text-outline-variant/50 transition-all duration-300" id="full_name" name="full_name" placeholder="e.g. Aditi Sharma" type="text"/>
</div>
<!-- Toggle/Selection for Invite Code or Mobile -->
<div class="pt-2">
<div class="flex items-center space-x-6 mb-4">
<button class="text-primary border-b-2 border-primary pb-1 text-xs font-semibold uppercase tracking-wider" type="button">Invite Code</button>
<button class="text-on-surface-variant pb-1 text-xs font-semibold uppercase tracking-wider hover:text-primary transition-colors" type="button">Mobile Number</button>
</div>
<div class="relative">
<label class="font-label text-[11px] uppercase tracking-widest text-secondary font-bold absolute -top-2 left-0 z-10" for="invite_code">Invite Code</label>
<input class="w-full bg-surface-container-high border-0 border-b-2 border-transparent focus:border-tertiary focus:ring-0 rounded-none pt-4 pb-2 px-0 text-on-surface placeholder:text-outline-variant/50 transition-all duration-300" id="invite_code" name="invite_code" placeholder="XXXX-XXXX" type="text"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-6">
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary font-body font-semibold rounded-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center space-x-2" type="submit">
<span>Enter Celebration</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_right_alt">arrow_right_alt</span>
</button>
</div>
</form>
<!-- Secondary Help Action -->
<div class="mt-8 text-center">
<button class="text-primary/70 hover:text-primary font-body text-xs underline decoration-primary/30 transition-colors">
                    Having trouble accessing your invite?
                </button>
</div>
</div>
<!-- Footer / Branding -->

<p class="text-on-surface-variant font-label text-[10px] uppercase tracking-[0.3em] opacity-60">

            </p>
